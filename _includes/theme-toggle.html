<button class="theme-toggle" type="button" aria-label="Toggle dark / light mode" title="Toggle dark / light mode">
  <i class="fas fa-moon theme-toggle__moon" aria-hidden="true"></i>
  <i class="fas fa-sun theme-toggle__sun" aria-hidden="true"></i>
</button>

<script>
  (function () {
    var btn = document.querySelector('.theme-toggle');
    if (!btn) return;

    btn.addEventListener('click', function () {
      var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
    });

    // Follow OS changes unless the user has made an explicit choice
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
        try { if (localStorage.getItem('theme')) return; } catch (err) {}
        document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
      });
    }
  })();
</script>
